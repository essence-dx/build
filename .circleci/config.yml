version: 2.1

orbs:
  win: circleci/windows@5.0

parameters:
  windows_release_artifacts:
    type: boolean
    default: false

commands:
  prepare_unix_workspace:
    steps:
      - run:
          name: Checkout sibling Cargo dependencies
          command: |
            set -euo pipefail
            fallback_branch="dev"
            default_owner="essence-dx"

            clone_dx_dependency() {
              name="$1"
              repository="$2"
              target="../${name}"
              if [ -d "${target}/.git" ]; then
                echo "Dependency ${name} already exists at ${target}"
                return 0
              fi
              branch="${CIRCLE_BRANCH:-$fallback_branch}"
              owner="${DX_GITHUB_OWNER:-$default_owner}"
              url="https://github.com/${owner}/${repository}.git"
              clone_dependency() {
                selected_branch="$1"
                if [ -n "${DX_GITHUB_TOKEN:-}" ]; then
                  echo "Using configured GitHub token for private dependency ${owner}/${repository}."
                  export DX_GITHUB_TOKEN
                  askpass="$(mktemp)"
                  cat > "${askpass}" \<<'EOF'
            #!/usr/bin/env sh
            case "$1" in
              *Username*) printf "%s\n" "x-access-token" ;;
              *Password*) printf "%s\n" "${DX_GITHUB_TOKEN}" ;;
              *) printf "\n" ;;
            esac
            EOF
                  chmod 700 "${askpass}"
                  auth_url="https://x-access-token@github.com/${owner}/${repository}.git"
                  GIT_ASKPASS="${askpass}" GIT_TERMINAL_PROMPT=0 git clone --depth 1 --branch "${selected_branch}" "${auth_url}" "${target}"
                  status="$?"
                  rm -f "${askpass}"
                  return "${status}"
                else
                  echo "DX_GITHUB_TOKEN is not configured; trying unauthenticated dependency clone."
                  git clone --depth 1 --branch "${selected_branch}" "${url}" "${target}"
                fi
              }
              clone_dependency "${branch}" || clone_dependency "${fallback_branch}" || {
                echo "Failed to clone dependency ${name} from ${owner}/${repository}. Private sibling dependencies require a scoped read token or an SSH key strategy." >&2
                return 1
              }
            }

            clone_dx_dependency "serializer" "dx-serializer"

jobs:
  linux-check:
    docker:
      - image: cimg/rust:1.94.0
    resource_class: small
    steps:
      - checkout
      - prepare_unix_workspace
      - restore_cache:
          keys:
            - dx-build-cargo-{{ arch }}-{{ checksum "Cargo.lock" }}
            - dx-build-cargo-{{ arch }}-
      - run:
          name: Cargo metadata
          command: cargo metadata --locked --no-deps --format-version 1
      - run:
          name: Cargo check
          command: |
            cargo check --locked -p rolldown --lib
      - save_cache:
          key: dx-build-cargo-{{ arch }}-{{ checksum "Cargo.lock" }}
          paths:
            - ~/.cargo/registry
            - ~/.cargo/git
  windows-release:
    executor:
      name: win/default
      size: medium
    steps:
      - checkout
      - run:
          name: Setup Node for dx-build package
          shell: powershell.exe
          command: |
            choco install nodejs-lts -y --no-progress --limit-output 2>$null || $true
            node --version
            npm --version
      - run:
          name: Build/pack Windows artifact for dx-build
          shell: powershell.exe
          command: |
            $ErrorActionPreference = "Stop"
            New-Item -ItemType Directory -Path dist -Force | Out-Null
            if (Test-Path "packages\dx-build") {
              Write-Host "Packaging dx-build from packages/dx-build"
              Copy-Item -Recurse -Force "packages\dx-build" "dist\dx-build"
            } else {
              Write-Host "dx-build package dir not present; creating minimal marker"
              New-Item -ItemType Directory -Path "dist\dx-build" -Force | Out-Null
              "dx-build windows artifact" | Set-Content "dist\dx-build\README.txt"
            }
            # If a rust-built engine binary exists for build, include (rolldown etc)
            if (Test-Path "target\release\rolldown.exe") { Copy-Item target\release\rolldown.exe dist\dx-build-rolldown.exe -Force }
            $shortSha = $env:CIRCLE_SHA1.Substring(0, 12)
            $archive = "dx-build-windows-x86_64-$shortSha.zip"
            Compress-Archive -Path "dist\*" -DestinationPath "dist\$archive" -Force
            $hash = Get-FileHash -Algorithm SHA256 -LiteralPath "dist\$archive"
            "$($hash.Hash.ToLowerInvariant())  $archive" | Set-Content -LiteralPath "dist\SHA256SUMS.txt" -Encoding ASCII
      - store_artifacts:
          path: dist
      - run:
          name: Upload to GitHub release essence-dx/build
          shell: powershell.exe
          command: |
            choco install gh -y --no-progress --limit-output
            $tag = "windows"
            gh release create $tag --repo essence-dx/build --title "Windows build" --notes "CI Windows artifact (dx-build package)" --target $env:CIRCLE_SHA1 2>$null || $true
            gh release upload $tag dist\dx-build-windows-*.zip --repo essence-dx/build --clobber

workflows:
  validate:
    jobs:
      - linux-check:
          filters:
            branches:
              only:
                - main
                - dev
  windows-release:
    when: << pipeline.parameters.windows_release_artifacts >>
    jobs:
      - windows-release

# Linux and macOS jobs commented out for now (enable later)
# jobs: ...
# workflows:
#   linux-release: ...
#   macos-release: ...
